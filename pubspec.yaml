name: boxed_app
description: A collaborative time capsule app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Appwrite
  appwrite: ^13.0.0

  # State management
  provider: ^6.1.2

  # Encryption
  cryptography: ^2.7.0

  # Image picking
  image_picker: ^1.1.2

  url_launcher: ^6.3.0

  

  # Secure local storage (for persisting master key)
  flutter_secure_storage: ^9.2.2

  # Date formatting
  intl: ^0.19.0

  # UUID generation
  uuid: ^4.4.2

  # Sharing
  share_plus: ^10.0.2

  

  # Loading shimmer effect
  shimmer: ^3.0.0

 

  cupertino_icons: ^1.0.8

  confetti: ^0.7.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1 

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

  